<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omba Mkopo | Kisura Wa Mbeya</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:url('bg.jpg') no-repeat center center/cover;
    color:#fff;
}
.overlay{
    background:rgba(0,0,0,0.85);
    min-height:100vh;
    padding:20px;
}
h1,h2{
    text-align:center;
}
.form-box{
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:10px;
}
label{
    display:block;
    margin-top:10px;
    font-size:14px;
}
input, select{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:none;
    margin-top:5px;
}
button{
    width:100%;
    margin-top:15px;
    padding:15px;
    background:#25D366;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}
.note{
    font-size:13px;
    margin-top:10px;
    background:rgba(255,255,255,0.15);
    padding:10px;
    border-left:4px solid #25D366;
}
.whatsapp-float{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:#fff;
    padding:15px;
    border-radius:50%;
    font-size:20px;
    text-decoration:none;
}
</style>
</head>

<body>
<div class="overlay">

<h1>OMBA MKOPO</h1>
<h2>KISURA WA MBEYA MIKOPO</h2>

<div class="form-box">

<label>Majina Kamili</label>
<input type="text" id="name" placeholder="Mfano: John Joseph">

<label>Umri</label>
<input type="number" id="age" placeholder="Miaka yako">

<label>Ajira / Kazi Unayojishughulisha</label>
<input type="text" id="job" placeholder="Mfano: Mfanyabiashara">

<label>Mkoa / Wilaya</label>
<input type="text" id="location" placeholder="Mfano: Mbeya - Uyole">

<label>Namba ya Simu</label>
<input type="tel" id="phone" placeholder="07XXXXXXXX">

<label>Kiasi cha Mkopo Unachohitaji</label>
<select id="loan">
<option value="">-- Chagua Kiasi --</option>
<option value="100000">Tsh 100,000</option>
<option value="200000">Tsh 200,000</option>
<option value="300000">Tsh 300,000</option>
<option value="400000">Tsh 400,000</option>
<option value="500000">Tsh 500,000</option>
<option value="600000">Tsh 600,000</option>
<option value="700000">Tsh 700,000</option>
<option value="800000">Tsh 800,000</option>
<option value="900000">Tsh 900,000</option>
<option value="1000000">Tsh 1,000,000</option>
<option value="2000000">Tsh 2,000,000</option>
<option value="3000000">Tsh 3,000,000</option>
<option value="4000000">Tsh 4,000,000</option>
<option value="5000000">Tsh 5,000,000</option>
<option value="10000000">Tsh 10,000,000</option>
</select>

<button onclick="payment.html">OMBA SASA</button>

<div class="note">
📌 Baada ya kubonyeza <b>OMBA SASA</b>:
<ul>
<li>page itafunguka</li>
<li></li>Tuma <bpicha yako</b> na <bpicha ya kitambulisho</b></li>
<li>Website itaendelea hatua ya malipo ya akiba</li>
</ul>
</div>

</div>
</div>

<a class="whatsapp-float"
href="https://wa.me/255741459349" target="_blank">💬</a>

<script>
function sendWhatsApp(){
    const name = document.getElementById('name').value.trim();
    const age = document.getElementById('age').value;
    const job = document.getElementById('job').value.trim();
    const location = document.getElementById('location').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const loan = document.getElementById('loan').value;

    if(!name || !age || !job || !location || !phone || !loan){
        alert("Tafadhali jaza taarifa zote");
        return;
    }

    if(age < 18){
        alert("Samahani, mkopo unatolewa kwa walio na umri wa miaka 18 na zaidi.");
        return;
    }

    // hifadhi mkopo kwa payment.html
    localStorage.setItem("loanAmount", loan);

    const message =
`OMBI LA MKOPO
Majina: ${name}
Umri: ${age}
Kazi/Ajira: ${job}
Mahali: ${location}
Simu: ${phone}
Kiasi cha Mkopo: Tsh ${loan}

Niko tayari kuendelea na hatua ya malipo ya akiba.`;

    const whatsappURL =
        "https://wa.me/255741459349?text=" + encodeURIComponent(message);

    // Fungua WhatsApp
    window.open(whatsappURL, "_blank");

    // Endelea payment page
    window.location.href = "payment.html";
}
</script>

</body>
</html>
